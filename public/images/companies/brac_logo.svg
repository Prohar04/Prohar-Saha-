<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <!-- Pill background -->
  <rect width="200" height="80" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- Accent left bar -->
  <rect x="14" y="18" width="3" height="44" rx="1.5" fill="url(#bracGrad)"/>

  <defs>
    <linearGradient id="bracGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- University name -->
  <text x="26" y="36" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="17" font-weight="700" fill="#94a3b8" letter-spacing="0.5">BRAC University</text>

  <!-- Subtitle -->
  <text x="26" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" fill="rgba(148,163,184,0.55)" letter-spacing="0.3">Dhaka, Bangladesh</text>

  <!-- CS undergrad note -->
  <text x="26" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="400" fill="rgba(167,139,250,0.5)">B.Sc. Computer Science · Currently Enrolled</text>
</svg>
