<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="enOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="enHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c0f00"/>
      <stop offset="100%" stop-color="#2d1500"/>
    </linearGradient>
    <linearGradient id="enPill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <clipPath id="enBrowserClip">
      <rect x="10" y="38" width="580" height="264" rx="0"/>
    </clipPath>
  </defs>

  <!-- Outer card -->
  <rect width="600" height="380" rx="12" fill="url(#enOuter)" stroke="rgba(124,58,237,0.25)" stroke-width="1"/>

  <!-- Browser chrome bar -->
  <rect x="10" y="10" width="580" height="28" rx="6" fill="#0a0a12"/>
  <rect x="10" y="28" width="580" height="10" fill="#0a0a12"/>
  <!-- Traffic lights -->
  <circle cx="30" cy="24" r="5" fill="#ff5f57"/>
  <circle cx="50" cy="24" r="5" fill="#ffbd2e"/>
  <circle cx="70" cy="24" r="5" fill="#28c840"/>
  <!-- URL bar -->
  <rect x="90" y="17" width="310" height="14" rx="7" fill="rgba(255,255,255,0.07)"/>
  <text x="245" y="27" font-family="system-ui, sans-serif" font-size="8.5" fill="#8892b0" text-anchor="middle">eventnest00.pythonanywhere.com</text>

  <!-- Browser content area background -->
  <rect x="10" y="38" width="580" height="264" fill="#fff8f0"/>

  <!-- App navbar inside browser -->
  <rect x="10" y="38" width="580" height="32" fill="#d97706"/>
  <text x="32" y="59" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#fff">EventNest</text>
  <!-- Nav items -->
  <text x="290" y="59" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Services</text>
  <text x="340" y="59" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">Book Now</text>
  <text x="390" y="59" font-family="system-ui, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)" text-anchor="middle">My Orders</text>
  <!-- Login button -->
  <rect x="535" y="44" width="45" height="18" rx="9" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <text x="557" y="56" font-family="system-ui, sans-serif" font-size="9" fill="#fff" text-anchor="middle">Log In</text>

  <!-- Hero section -->
  <rect x="10" y="70" width="580" height="72" fill="url(#enHero)"/>
  <!-- Hero text -->
  <text x="290" y="95" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#fbbf24" text-anchor="middle">Find Your Perfect Event Service</text>
  <text x="290" y="112" font-family="system-ui, sans-serif" font-size="10" fill="rgba(251,191,36,0.7)" text-anchor="middle">Photography · Catering · Event Management · Printing</text>
  <!-- Search bar -->
  <rect x="150" y="120" width="300" height="18" rx="9" fill="rgba(255,255,255,0.12)" stroke="rgba(251,191,36,0.4)" stroke-width="1"/>
  <text x="300" y="132" font-family="system-ui, sans-serif" font-size="9" fill="rgba(251,191,36,0.5)" text-anchor="middle">Search services in Dhaka...</text>

  <!-- Section heading -->
  <text x="20" y="160" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#92400e">Popular Services</text>

  <!-- Service Card 1 — Photography -->
  <rect x="16" y="165" width="178" height="130" rx="6" fill="#fff" stroke="rgba(217,119,6,0.2)" stroke-width="1"/>
  <!-- Card accent top -->
  <rect x="16" y="165" width="178" height="5" rx="3" fill="#d97706"/>
  <!-- Icon placeholder -->
  <rect x="65" y="178" width="80" height="50" rx="6" fill="#fef3c7"/>
  <!-- Camera icon simplified -->
  <circle cx="105" cy="203" r="16" fill="none" stroke="#d97706" stroke-width="2"/>
  <circle cx="105" cy="203" r="8" fill="#d97706" opacity="0.6"/>
  <rect x="95" y="187" width="6" height="4" rx="1" fill="#d97706"/>
  <text x="105" y="245" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1c1917" text-anchor="middle">Photography</text>
  <text x="105" y="259" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">Event &amp; Portrait</text>
  <!-- Price -->
  <rect x="32" y="268" width="148" height="18" rx="4" fill="#d97706"/>
  <text x="106" y="280" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Starting ৳5,000</text>

  <!-- Service Card 2 — Catering -->
  <rect x="206" y="165" width="178" height="130" rx="6" fill="#fff" stroke="rgba(217,119,6,0.2)" stroke-width="1"/>
  <rect x="206" y="165" width="178" height="5" rx="3" fill="#b45309"/>
  <rect x="255" y="178" width="80" height="50" rx="6" fill="#fef3c7"/>
  <!-- Plate icon simplified -->
  <circle cx="295" cy="203" r="16" fill="none" stroke="#b45309" stroke-width="2"/>
  <line x1="280" y1="197" x2="310" y2="197" stroke="#b45309" stroke-width="1.5"/>
  <rect x="291" y="188" width="8" height="9" rx="2" fill="#b45309" opacity="0.6"/>
  <text x="295" y="245" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1c1917" text-anchor="middle">Catering</text>
  <text x="295" y="259" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">All Cuisines</text>
  <rect x="222" y="268" width="148" height="18" rx="4" fill="#b45309"/>
  <text x="296" y="280" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Starting ৳8,000</text>

  <!-- Service Card 3 — Event Management -->
  <rect x="396" y="165" width="188" height="130" rx="6" fill="#fff" stroke="rgba(217,119,6,0.2)" stroke-width="1"/>
  <rect x="396" y="165" width="188" height="5" rx="3" fill="#92400e"/>
  <rect x="445" y="178" width="90" height="50" rx="6" fill="#fef3c7"/>
  <!-- Star icon simplified -->
  <polygon points="490,186 493,196 503,196 495,202 498,212 490,206 482,212 485,202 477,196 487,196" fill="none" stroke="#92400e" stroke-width="1.5"/>
  <text x="490" y="245" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#1c1917" text-anchor="middle">Event Mgmt</text>
  <text x="490" y="259" font-family="system-ui, sans-serif" font-size="9" fill="#78716c" text-anchor="middle">Full Service</text>
  <rect x="412" y="268" width="160" height="18" rx="4" fill="#92400e"/>
  <text x="492" y="280" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Starting ৳15,000</text>

  <!-- Bottom label strip -->
  <rect x="0" y="308" width="600" height="72" rx="12" fill="rgba(0,0,0,0.3)"/>
  <rect x="0" y="308" width="600" height="4" fill="url(#enPill)"/>
  <!-- Project name -->
  <text x="20" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f0f4ff">EventNest</text>
  <text x="20" y="353" font-family="system-ui, sans-serif" font-size="10" fill="#8892b0">Full-stack event marketplace · Bangladesh</text>
  <!-- Tech pills -->
  <rect x="368" y="318" width="54" height="18" rx="9" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="395" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">Django</text>
  <rect x="428" y="318" width="44" height="18" rx="9" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
  <text x="450" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#67e8f9" text-anchor="middle">Python</text>
  <rect x="478" y="318" width="46" height="18" rx="9" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="501" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">SQLite</text>
  <rect x="530" y="318" width="52" height="18" rx="9" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
  <text x="556" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Bootstrap</text>
</svg>
