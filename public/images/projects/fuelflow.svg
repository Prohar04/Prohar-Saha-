  <text x="308" y="202" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="rgba(52,211,153,0.7)">Date</text>
  <text x="358" y="202" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="rgba(52,211,153,0.7)">Type</text>
  <text x="418" y="202" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="rgba(52,211,153,0.7)">Liters</text>
  <text x="480" y="202" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="rgba(52,211,153,0.7)">Amount</text>
  <!-- Row 1 -->
  <line x1="296" y1="208" x2="574" y2="208" stroke="rgba(16,185,129,0.1)" stroke-width="1"/>
  <text x="308" y="220" font-family="system-ui, sans-serif" font-size="8" fill="rgba(136,146,176,0.6)">May 15</text>
  <text x="358" y="220" font-family="system-ui, sans-serif" font-size="8" fill="rgba(16,185,129,0.8)">Octane</text>
  <text x="418" y="220" font-family="system-ui, sans-serif" font-size="8" fill="rgba(136,146,176,0.6)">120 L</text>
  <text x="480" y="220" font-family="system-ui, sans-serif" font-size="8" fill="rgba(52,211,153,0.7)">৳14,400</text>
  <!-- Row 2 -->
  <line x1="296" y1="226" x2="574" y2="226" stroke="rgba(16,185,129,0.1)" stroke-width="1"/>
  <text x="308" y="238" font-family="system-ui, sans-serif" font-size="8" fill="rgba(136,146,176,0.6)">May 15</text>
  <text x="358" y="238" font-family="system-ui, sans-serif" font-size="8" fill="rgba(251,191,36,0.7)">Diesel</text>
  <text x="418" y="238" font-family="system-ui, sans-serif" font-size="8" fill="rgba(136,146,176,0.6)">230 L</text>
  <text x="480" y="238" font-family="system-ui, sans-serif" font-size="8" fill="rgba(52,211,153,0.7)">৳21,850</text>
  <!-- Row 3 -->
  <line x1="296" y1="244" x2="574" y2="244" stroke="rgba(16,185,129,0.1)" stroke-width="1"/>
  <text x="308" y="256" font-family="system-ui, sans-serif" font-size="8" fill="rgba(136,146,176,0.6)">May 14</text>
  <text x="358" y="256" font-family="system-ui, sans-serif" font-size="8" fill="rgba(16,185,129,0.8)">Octane</text>
  <text x="418" y="256" font-family="system-ui, sans-serif" font-size="8" fill="rgba(136,146,176,0.6)">95 L</text>
  <text x="480" y="256" font-family="system-ui, sans-serif" font-size="8" fill="rgba(52,211,153,0.7)">৳11,400</text>
  <!-- Row 4 -->
  <line x1="296" y1="262" x2="574" y2="262" stroke="rgba(16,185,129,0.1)" stroke-width="1"/>
  <text x="308" y="274" font-family="system-ui, sans-serif" font-size="8" fill="rgba(136,146,176,0.6)">May 14</text>
  <text x="358" y="274" font-family="system-ui, sans-serif" font-size="8" fill="rgba(251,191,36,0.7)">Diesel</text>
  <text x="418" y="274" font-family="system-ui, sans-serif" font-size="8" fill="rgba(136,146,176,0.6)">180 L</text>
  <text x="480" y="274" font-family="system-ui, sans-serif" font-size="8" fill="rgba(52,211,153,0.7)">৳17,100</text>
  <line x1="296" y1="280" x2="574" y2="280" stroke="rgba(16,185,129,0.08)" stroke-width="1"/>
  <text x="308" y="288" font-family="system-ui, sans-serif" font-size="7.5" fill="rgba(136,146,176,0.3)">Showing 4 of 24 records today</text>

  <!-- Bottom label strip -->
  <rect x="0" y="308" width="600" height="72" rx="12" fill="rgba(0,0,0,0.35)"/>
  <rect x="0" y="308" width="600" height="4" fill="url(#ffPill)"/>
  <text x="20" y="335" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#f0f4ff">FuelFlow</text>
  <text x="20" y="353" font-family="system-ui, sans-serif" font-size="10" fill="#8892b0">Gas station inventory &amp; sales management system</text>
  <!-- Tech pills -->
  <rect x="430" y="318" width="46" height="18" rx="9" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
  <text x="453" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">HTML</text>
  <rect x="482" y="318" width="38" height="18" rx="9" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.35)" stroke-width="1"/>
  <text x="501" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#67e8f9" text-anchor="middle">CSS</text>
  <rect x="526" y="318" width="54" height="18" rx="9" fill="rgba(124,58,237,0.2)" stroke="rgba(124,58,237,0.4)" stroke-width="1"/>
  <text x="553" y="330" font-family="system-ui, sans-serif" font-size="9" fill="#a78bfa" text-anchor="middle">JavaScript</text>
</svg>
