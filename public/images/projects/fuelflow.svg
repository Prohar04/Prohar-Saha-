  <rect x="16" y="190" width="270" height="100" rx="4" fill="rgba(0,0,0,0.3)"/>
  <!-- Y-axis labels -->
  <text x="20" y="202" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)">500</text>
  <text x="20" y="231" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)">250</text>
  <text x="20" y="260" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)">0</text>
