  <rect x="42" y="230" width="24" height="50" rx="2" fill="url(#ffBar1)" opacity="0.8"/>
  <text x="54" y="288" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)" text-anchor="middle">Mon</text>
  <rect x="76" y="218" width="24" height="62" rx="2" fill="url(#ffBar1)" opacity="0.9"/>
  <text x="88" y="288" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)" text-anchor="middle">Tue</text>
  <rect x="110" y="240" width="24" height="40" rx="2" fill="url(#ffBar2)" opacity="0.7"/>
  <text x="122" y="288" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)" text-anchor="middle">Wed</text>
  <rect x="144" y="210" width="24" height="70" rx="2" fill="url(#ffBar1)"/>
  <text x="156" y="288" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)" text-anchor="middle">Thu</text>
  <rect x="178" y="225" width="24" height="55" rx="2" fill="url(#ffBar2)" opacity="0.85"/>
  <text x="190" y="288" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)" text-anchor="middle">Fri</text>
  <rect x="212" y="198" width="24" height="82" rx="2" fill="url(#ffBar1)"/>
  <text x="224" y="288" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)" text-anchor="middle">Sat</text>
  <rect x="246" y="207" width="24" height="73" rx="2" fill="url(#ffBar2)" opacity="0.9"/>
  <text x="258" y="288" font-family="system-ui, sans-serif" font-size="7" fill="rgba(136,146,176,0.4)" text-anchor="middle">Sun</text>

