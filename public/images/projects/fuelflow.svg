<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="ffOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a140a"/>
      <stop offset="100%" stop-color="#050d05"/>
    </linearGradient>
    <linearGradient id="ffContent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#0a150a"/>
    </linearGradient>
    <linearGradient id="ffStat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="ffBar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ffBar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <linearGradient id="ffPill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Outer card -->
  <rect width="600" height="380" rx="12" fill="url(#ffOuter)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>

  <!-- Browser chrome -->
  <rect x="10" y="10" width="580" height="28" rx="6" fill="#030808"/>
  <rect x="10" y="28" width="580" height="10" fill="#030808"/>
  <circle cx="30" cy="24" r="5" fill="#ff5f57"/>
  <circle cx="50" cy="24" r="5" fill="#ffbd2e"/>
  <circle cx="70" cy="24" r="5" fill="#28c840"/>
  <rect x="90" y="17" width="240" height="14" rx="7" fill="rgba(255,255,255,0.06)"/>
  <text x="210" y="27" font-family="system-ui, sans-serif" font-size="8.5" fill="#8892b0" text-anchor="middle">fuelflow-app · localhost:3000</text>

  <!-- Content area -->
  <rect x="10" y="38" width="580" height="264" fill="url(#ffContent)"/>

  <!-- App header bar -->
  <rect x="10" y="38" width="580" height="28" fill="#061a0a"/>
  <text x="30" y="57" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#10b981">⛽ FuelFlow</text>
  <text x="165" y="57" font-family="system-ui, sans-serif" font-size="9" fill="rgba(16,185,129,0.5)">Gas Station Management System</text>
  <!-- Date chip -->
  <rect x="490" y="44" width="90" height="16" rx="4" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="535" y="55" font-family="system-ui, sans-serif" font-size="8" fill="rgba(52,211,153,0.7)" text-anchor="middle">May 15, 2026</text>

  <!-- Sub-nav -->
  <text x="30" y="84" font-family="system-ui, sans-serif" font-size="9" fill="#10b981" font-weight="600">Dashboard</text>
  <text x="100" y="84" font-family="system-ui, sans-serif" font-size="9" fill="rgba(136,146,176,0.5)">Inventory</text>
  <text x="160" y="84" font-family="system-ui, sans-serif" font-size="9" fill="rgba(136,146,176,0.5)">Sales</text>
  <text x="205" y="84" font-family="system-ui, sans-serif" font-size="9" fill="rgba(136,146,176,0.5)">Reports</text>
  <line x1="10" y1="88" x2="590" y2="88" stroke="rgba(16,185,129,0.12)" stroke-width="1"/>
  <line x1="16" y1="88" x2="85" y2="88" stroke="#10b981" stroke-width="2"/>

  <!-- Stat cards row -->
  <!-- Card 1: Fuel Level -->
  <rect x="16" y="96" width="178" height="72" rx="6" fill="url(#ffStat1)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="28" y="116" font-family="system-ui, sans-serif" font-size="9" fill="rgba(52,211,153,0.6)">⛽  FUEL LEVEL</text>
  <text x="28" y="142" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#10b981">78%</text>
  <!-- Progress bar -->
  <rect x="28" y="155" width="150" height="6" rx="3" fill="rgba(16,185,129,0.2)"/>
  <rect x="28" y="155" width="117" height="6" rx="3" fill="#10b981"/>

  <!-- Card 2: Sales -->
  <rect x="204" y="96" width="178" height="72" rx="6" fill="rgba(6,78,59,0.3)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="216" y="116" font-family="system-ui, sans-serif" font-size="9" fill="rgba(52,211,153,0.6)">&#x1F4B0;  TODAY'S SALES</text>
  <text x="216" y="142" font-family="system-ui, sans-serif" font-size="20" font-weight="800" fill="#34d399">৳42,000</text>
  <text x="216" y="157" font-family="system-ui, sans-serif" font-size="8" fill="rgba(52,211,153,0.45)">↑ 12% vs yesterday</text>

  <!-- Card 3: Orders -->
  <rect x="392" y="96" width="178" height="72" rx="6" fill="rgba(5,46,22,0.5)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
  <text x="404" y="116" font-family="system-ui, sans-serif" font-size="9" fill="rgba(52,211,153,0.6)">&#x1F4CB;  ORDERS TODAY</text>
  <text x="404" y="142" font-family="system-ui, sans-serif" font-size="26" font-weight="800" fill="#10b981">24</text>
  <text x="404" y="157" font-family="system-ui, sans-serif" font-size="8" fill="rgba(52,211,153,0.45)">8 pending · 16 complete</text>

  <!-- Bar chart section -->
  <text x="20" y="186" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="rgba(52,211,153,0.6)">WEEKLY FUEL SALES (Liters)</text>
